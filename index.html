<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人简历 | 刘晓飞</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            color: #1a202c;
        }
        .hero-gradient {
            background: linear-gradient(to bottom, rgba(0,0,0,0.01), rgba(255,255,255,1));
            /*background: transparent;*/
        }
        .section-title {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }
        .section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 40px;
            height: 2px;
            background-color: #3182ce;
        }
        .rich-text ul { list-style-type: disc; padding-left: 1.25rem; margin-top: 0.5rem; }
        .rich-text li { margin-bottom: 0.25rem; }
        .rich-text p { margin-bottom: 0.5rem; }

        html { scroll-behavior: smooth; }

        /* 切换按钮样式 */
        .lang-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .lang-switch:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="antialiased">

    <button id="lang-btn" class="lang-switch" onclick="toggleLanguage()">
        English
    </button>

    <div class="relative h-[450px] w-full overflow-hidden">
        <img id="hero-img" src="" alt="背景照" class="absolute inset-0 w-full h-full object-cover object-top">
        <div class="absolute inset-0 hero-gradient"></div>
        <div class="absolute bottom-10 left-0 right-0 text-center">
            <h1 id="user-name" class="text-4xl md:text-5xl font-semibold tracking-tight text-gray-900">加载中...</h1>
            <p id="user-title" class="mt-2 text-lg text-gray-500 font-light tracking-widest uppercase"></p>

            <div id="social-links" class="mt-6 flex justify-center items-center gap-6"></div>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-6 py-12">

        <section id="about-section" class="mb-16">
            <h2 id="label-about" class="text-xl font-semibold section-title">专业技能</h2>
            <div id="about-text" class="text-gray-600 leading-relaxed rich-text text-sm"></div>
        </section>

        <section id="experience-section" class="mb-16">
            <h2 id="label-experience" class="text-xl font-semibold section-title">工作经历</h2>
            <div id="experience-container" class="space-y-10"></div>
        </section>

        <section id="projects-section" class="mb-16">
            <h2 id="label-projects" class="text-xl font-semibold section-title">项目经历</h2>
            <div id="projects-container" class="grid grid-cols-1 gap-12"></div>
        </section>

        <section id="awards-section" class="mb-16">
            <h2 id="label-awards" class="text-xl font-semibold section-title">荣誉与专利</h2>
            <div id="cert-container" class="space-y-6"></div>
        </section>

        <section id="education-section" class="mb-16">
            <h2 id="label-education" class="text-xl font-semibold section-title">教育经历</h2>
            <div id="education-container" class="space-y-4"></div>
        </section>

    </main>

    <footer class="border-t border-gray-50 py-12 text-center">
        <p id="footer-copy" class="text-xs text-gray-400"></p>
        <p id="footer-quote" class="text-xs text-gray-300 mt-1 italic"></p>
    </footer>

    <script>
        const ICONS = {
            email: `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>`,
            github: `<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"></path></svg>`,
            website: `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.828 10.172a4 4 0 010 5.656l-2 2a4 4 0 01-5.656-5.656l1-1m3.657-2.829a4 4 0 015.656 0l2 2a4 4 0 01-5.656 5.656l-1-1"></path></svg>`,
            link: `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.828 10.172a4 4 0 010 5.656l-2 2a4 4 0 01-5.656-5.656l1-1m3.657-2.829a4 4 0 015.656 0l2 2a4 4 0 01-5.656 5.656l-1-1"></path></svg>`
        };

        const FALLBACK_BG = "assets/background.webp";
        const RESUME_FILES = {
            zh: "./assets/resume-data.json",
            en: "./assets/resume-data-en.json"
        };
        let currentLang = "zh";

        function asArray(value) {
            return Array.isArray(value) ? value : [];
        }

        function hasText(value) {
            return typeof value === "string" && value.trim().length > 0;
        }

        function showSection(id, show) {
            const section = document.getElementById(id);
            if (!section) return;
            section.style.display = show ? "block" : "none";
        }

        function normalizeSocialType(type, label = "", url = "") {
            const combined = `${type || ""} ${label || ""} ${url || ""}`.toLowerCase();
            if (combined.includes("github")) return "github";
            if (combined.includes("email") || combined.includes("mailto:")) return "email";
            if (combined.includes("website")) return "website";
            return "link";
        }

        function renderSocialLinks(profile) {
            const socialLinks = document.getElementById('social-links');
            const links = asArray(profile?.links).filter((item) => hasText(item?.url));
            const hasGithub = links.some((link) => normalizeSocialType(link.type, link.label, link.url) === "github");
            const mergedLinks = hasGithub
                ? links
                : [...links, { label: "GitHub", url: "https://github.com/LXF0047", type: "github" }];

            socialLinks.innerHTML = mergedLinks.map(link => {
                const type = normalizeSocialType(link.type, link.label, link.url);
                const label = hasText(link.label) ? link.label : link.url;
                if (type === "email") {
                    const emailText = String(link.url || "").replace(/^mailto:/i, "");
                    return `
                        <span class="flex items-center gap-2 text-gray-500">
                            <span class="p-1.5 bg-white/50 backdrop-blur-sm rounded-full shadow-sm">
                                ${ICONS[type] || ICONS.link}
                            </span>
                            <span class="text-sm font-medium tracking-wide">${emailText}</span>
                        </span>
                    `;
                }
                if (type === "github") {
                    const githubText = String(link.url || "");
                    return `
                        <span class="flex items-center gap-2 text-gray-500">
                            <span class="p-1.5 bg-white/50 backdrop-blur-sm rounded-full shadow-sm">
                                ${ICONS[type] || ICONS.link}
                            </span>
                            <span class="text-sm font-medium tracking-wide">${githubText}</span>
                        </span>
                    `;
                }
                return `
                    <a href="${link.url}" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 text-gray-500 hover:text-blue-600 transition-colors duration-300">
                        <span class="p-1.5 bg-white/50 backdrop-blur-sm rounded-full shadow-sm">
                            ${ICONS[type] || ICONS.link}
                        </span>
                        <span class="text-sm font-medium tracking-wide">${label}</span>
                    </a>
                `;
            }).join('');
        }

        function renderExperience(experience) {
            const container = document.getElementById('experience-container');
            const items = asArray(experience?.items);
            container.innerHTML = items.map((exp, index) => {
                const active = hasText(exp.period) && (exp.period.includes("至今") || exp.period.toLowerCase().includes("present"));
                return `
                    <div class="relative pl-6 border-l border-gray-100">
                        <div class="absolute w-2 h-2 ${active || index === 0 ? 'bg-blue-500' : 'bg-gray-300'} rounded-full -left-[4.5px] top-2"></div>
                        <div class="flex flex-col md:flex-row md:justify-between mb-1">
                            <h3 class="font-semibold text-gray-800">${exp.company || ''}</h3>
                            <span class="text-sm text-gray-400">${exp.period || ''}</span>
                        </div>
                        <p class="text-sm text-blue-600 mb-2 font-medium">${exp.role || ''}</p>
                        <div class="text-gray-600 text-sm rich-text">${exp.description || ''}</div>
                    </div>
                `;
            }).join('');

            showSection("experience-section", items.length > 0);
        }

        function renderProjects(projects, customSections) {
            const container = document.getElementById('projects-container');
            const projectItems = asArray(projects?.items);

            const customItems = asArray(customSections)
                .filter((section) => asArray(section.items).length > 0)
                .flatMap((section) => asArray(section.items));

            const mainBlocks = projectItems.map((p) => `
                <div class="group border-b border-gray-50 pb-8 last:border-0">
                    <div class="flex flex-col md:flex-row md:items-baseline md:justify-between mb-3">
                        <h3 class="font-semibold text-gray-800 group-hover:text-blue-600 transition text-lg">${p.name || ''}</h3>
                        <span class="text-xs font-medium text-blue-500 bg-blue-50 px-2 py-1 rounded">${p.period || '项目'}</span>
                    </div>
                    <div class="text-sm text-gray-600 rich-text">${p.description || ''}</div>
                </div>
            `);

            const extraBlocks = customItems.map((item) => `
                <div class="group border-b border-gray-50 pb-8 last:border-0">
                    <div class="flex flex-col md:flex-row md:items-baseline md:justify-between mb-3">
                        <h3 class="font-semibold text-gray-800 group-hover:text-blue-600 transition text-lg">${item.name || item.company || item.title || item.school || ''}</h3>
                        <span class="text-xs font-medium text-blue-500 bg-blue-50 px-2 py-1 rounded">${item.period || '项目'}</span>
                    </div>
                    <div class="text-sm text-gray-600 rich-text">${item.description || ''}</div>
                </div>
            `);

            const allBlocks = [...mainBlocks, ...extraBlocks];
            container.innerHTML = allBlocks.join('');
            showSection("projects-section", allBlocks.length > 0);
        }

        function renderCertifications(certifications, awards) {
            const container = document.getElementById('cert-container');
            const certItems = asArray(certifications?.items);
            const awardItems = asArray(awards?.items);
            const items = [...certItems, ...awardItems];

            container.innerHTML = items.map((c) => {
                const right = [c.issuer, c.date].filter(hasText).join(" · ");
                return `
                    <div class="flex flex-col md:flex-row md:gap-4">
                        <span class="text-sm font-semibold text-gray-400 w-32 shrink-0">${c.title || ''}</span>
                        <div class="text-sm text-gray-600 rich-text">${c.description || ''}${right ? `<p class='mt-1 text-xs text-gray-400'>${right}</p>` : ''}</div>
                    </div>
                `;
            }).join('');

            showSection("awards-section", items.length > 0);
        }

        function renderEducation(education) {
            const container = document.getElementById('education-container');
            const items = asArray(education?.items);
            container.innerHTML = items.map((edu) => {
                const degreeText = edu.degreeArea || [edu.degree, edu.area].filter(hasText).join(" · ");
                return `
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-semibold text-gray-800 text-sm">${edu.school || ''}</h3>
                            <p class="text-xs text-gray-500 mt-1">${degreeText || ''}</p>
                        </div>
                        <span class="text-xs text-gray-400">${edu.period || ''}</span>
                    </div>
                `;
            }).join('');

            showSection("education-section", items.length > 0);
        }

        function renderResume(data) {
            const profile = data?.profile || {};
            const summary = data?.summary || null;
            const experience = data?.experience || null;
            const projects = data?.projects || null;
            const certifications = data?.certifications || null;
            const awards = data?.awards || null;
            const education = data?.education || null;
            const customSections = data?.customSections || [];
            const footer = data?.footer || {};

            document.getElementById('hero-img').src = profile.backgroundImage || FALLBACK_BG;
            document.getElementById('user-name').innerText = profile.name || '未命名';
            document.getElementById('user-title').innerText = profile.headline || '';

            document.getElementById('label-about').innerText = summary?.title || '专业技能';
            document.getElementById('label-experience').innerText = experience?.title || '工作经历';
            document.getElementById('label-projects').innerText = projects?.title || '项目经历';
            document.getElementById('label-awards').innerText = certifications?.title || awards?.title || '荣誉与专利';
            document.getElementById('label-education').innerText = education?.title || '教育经历';

            document.getElementById('about-text').innerHTML = summary?.content || '';
            showSection("about-section", hasText(summary?.content));

            renderSocialLinks(profile);
            renderExperience(experience);
            renderProjects(projects, customSections);
            renderCertifications(certifications, awards);
            renderEducation(education);

            document.getElementById('footer-copy').innerText = footer.copy || '';
            document.getElementById('footer-quote').innerText = footer.quote || '';
        }

        function updateLangButton() {
            const btn = document.getElementById("lang-btn");
            btn.innerText = currentLang === "zh" ? "English" : "简体中文";
        }

        async function loadResume(lang = currentLang) {
            try {
                const file = RESUME_FILES[lang] || RESUME_FILES.zh;
                const response = await fetch(file, { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const resumeData = await response.json();
                renderResume(resumeData);
                currentLang = lang;
                updateLangButton();
            } catch (error) {
                console.error('加载简历失败:', error);
                document.getElementById('user-name').innerText = '加载失败';
                document.getElementById('about-text').innerHTML = '<p>请确认 <code>assets/resume-data.json</code> 和 <code>assets/resume-data-en.json</code> 存在。</p>';
            }
        }

        function toggleLanguage() {
            const target = currentLang === "zh" ? "en" : "zh";
            loadResume(target);
        }

        window.onload = () => loadResume("zh");
    </script>
</body>
</html>
